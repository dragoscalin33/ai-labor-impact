name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        # Lean runtime + the dev/test tooling (ruff, mypy, pytest, coverage).
        # We avoid `requirements-dev.txt` here on purpose — that pulls in
        # PyMC + MLflow which aren't needed to lint or run the unit tests
        # and would slow CI by ~5 min for no benefit.
        run: |
          pip install -r requirements.txt
          pip install ruff mypy pytest pytest-cov types-requests

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Type check with mypy
        run: mypy src/ --ignore-missing-imports

      - name: Run tests
        run: pytest tests/ -v --override-ini="addopts=" --cov=src --cov-report=xml
        env:
          # Tests use only public APIs — no keys needed for CI
          CI: true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
