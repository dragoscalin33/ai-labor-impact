services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-labor-impact:latest
    container_name: ai-labor-impact
    ports:
      - "8501:8501"
    environment:
      # Optional LLM keys for the Insights tab — leave unset for the
      # bundled (no-key) cached narratives.
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
